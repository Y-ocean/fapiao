<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>发票凑单智能助手</title>
    <style>
        :root {
            --primary: #07c160;
            --bg: #fbfcfd;
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-sub: #666666;
            --radius: 16px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 20px 16px;
            color: var(--text-main);
            line-height: 1.6;
        }

        .container { max-width: 500px; margin: 0 auto; width: 100%; }

        /* 头部文案：大气排版 */
        .header { margin-bottom: 24px; padding-left: 4px; }
        .header h1 { font-size: 24px; font-weight: 800; margin: 0; letter-spacing: -0.5px; }
        .header p { font-size: 13px; color: var(--text-sub); margin: 8px 0 0 0; line-height: 1.5; }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(149, 157, 165, 0.1);
        }

        /* 输入控件美化 */
        .section-title { 
            display: flex; align-items: center; 
            font-size: 14px; font-weight: 700; margin-bottom: 12px; color: #444;
        }
        .section-title i { margin-right: 6px; font-style: normal; }

        textarea {
            width: 100%; height: 160px; padding: 14px;
            border: 1px solid #f0f0f0; border-radius: 12px;
            font-size: 13px; background: #fafafa; resize: none;
            color: #444; transition: all 0.3s ease;
        }
        textarea:focus { border-color: var(--primary); background: #fff; outline: none; box-shadow: 0 0 0 4px rgba(7, 193, 96, 0.08); }

        .setting-flex { 
            display: flex; align-items: center; justify-content: space-between;
            margin-top: 16px; padding: 12px; background: #f8f9fa; border-radius: 10px;
        }
        .input-num-wrap { display: flex; align-items: center; gap: 8px; }
        .input-num {
            height: 34px; width: 90px; padding: 0 8px;
            border: 1px solid #ddd; border-radius: 6px;
            font-size: 15px; font-weight: 700; color: var(--primary); text-align: center;
        }

        button {
            width: 100%; background: var(--primary); color: white;
            border: none; padding: 16px; font-size: 16px; font-weight: 700;
            border-radius: 12px; cursor: pointer; margin-top: 20px;
            transition: all 0.2s;
        }
        button:active { transform: translateY(1px); opacity: 0.9; }

        /* 广告位重塑：高级感橙色渐变 */
        .ad-box { 
            background: linear-gradient(135deg, #fffcf5 0%, #fff7e6 100%);
            border: 1px solid #ffe8cc; padding: 20px;
        }
        .ad-tag { 
            display: inline-block; background: #ff4e00; color: #fff; 
            font-size: 10px; padding: 2px 8px; border-radius: 4px; margin-bottom: 10px;
        }
        .ad-title { color: #ff4e00; font-weight: 800; font-size: 15px; margin-bottom: 6px; }
        .ad-sub { font-size: 12px; color: #7a5c33; margin-bottom: 16px; }
        .ad-flex { display: flex; justify-content: space-around; gap: 12px; }
        .ad-item { background: #fff; padding: 10px; border-radius: 12px; box-shadow: 0 4px 12px rgba(255, 78, 0, 0.05); }
        .ad-item img { width: 90px; height: 90px; border-radius: 6px; display: block; }
        .ad-item span { display: block; font-size: 11px; font-weight: 700; margin-top: 8px; color: #555; }

        /* 结果区域美化 */
        .res-card {
            background: #fff; border-radius: 12px; padding: 18px; margin-bottom: 14px;
            border-left: 5px solid var(--primary);
        }
        .res-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
        .res-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 1px; }
        .res-amount { font-size: 22px; font-weight: 800; color: var(--primary); line-height: 1; }
        .tag-group { display: flex; flex-wrap: wrap; gap: 6px; }
        .item-tag { background: #f2f4f7; color: #4b5563; font-size: 12px; padding: 4px 10px; border-radius: 6px; font-weight: 500; }

        .remain-card { background: #fff1f0; border-radius: 12px; padding: 18px; border: 1px solid #ffa39e; }
        .remain-title { color: #cf1322; font-weight: 700; font-size: 14px; margin-bottom: 12px; }

        .footer-tips { text-align: center; font-size: 11px; color: #ff4e00; font-weight: bold; margin-top: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>发票凑单智能助手</h1>
        <p>💡拒绝烧脑 · 一键秒出最佳发票组合，数据不上传，自动计算最优的发票组合。</p>
    </div>

    <div class="card">
        <div class="section-title"><i>📋</i> 发票金额明细</div>
        <textarea id="invoiceInput" placeholder="在此粘贴发票金额明细，支持空格、逗号或回车分隔..."></textarea>
        
        <div class="setting-flex">
            <span style="font-size: 13px; font-weight: 600; color: #666;">🎯 起始目标金额</span>
            <div class="input-num-wrap">
                <input type="number" id="targetInput" class="input-num" value="100.00" step="0.01">
                <span style="font-size: 12px; color: #999;">元起</span>
            </div>
        </div>

        <button onclick="solveInvoiceLogic()">立即开启科学凑单</button>
    </div>

    <div class="card ad-box">
        <div class="ad-tag">福利精选</div>
        <div class="ad-title">我们每天搜罗【淘/京/拼】领隐藏券、1分钱好物、外卖大红包，一年多省几千块！</div>
        <div class="ad-sub">添加小助手进群，锁定每日漏洞单与全网神价格</div>
        <div class="ad-flex">
            <div class="ad-item">
                <img src="mp.jpg" alt="公众号">
                <span style="color: #ff9800;">关注公众号</span>
            </div>
            <div class="ad-item">
                <img src="wx.jpg" alt="微信">
                <span style="color: #00b0ff;">加小助手进群</span>
            </div>
        </div>
        <div class="footer-tips">⚠️ 漏洞单几分钟就抢完，早进群1分钟，多抢一个免单！</div>
    </div>

    <div id="resultCard" style="display: none;">
        <div class="section-title" style="margin-top: 10px; padding-left: 5px;">📊 智能分配建议</div>
        <div id="resultContent"></div>
    </div>
</div>

<script>
// --- 核心算法：100% 还原 Python 逻辑，确保实用第一 ---
function findSubsetSumPerfect(nums, target) {
    let dp = { 0: -1 };
    for (let i = 0; i < nums.length; i++) {
        let val = nums[i];
        let newEntries = {};
        for (let s in dp) {
            let newSum = parseInt(s) + val;
            if (newSum <= target && !(newSum in dp)) {
                newEntries[newSum] = i;
            }
        }
        Object.assign(dp, newEntries);
        if (target in dp) {
            let res = [];
            let curr = target;
            while (curr > 0) {
                let index = dp[curr];
                let valFound = nums[index];
                res.push(valFound);
                curr -= valFound;
            }
            return res;
        }
    }
    return null;
}

function solveInvoiceLogic() {
    const rawInput = document.getElementById('invoiceInput').value;
    const startTargetValue = parseFloat(document.getElementById('targetInput').value);
    
    let pool = rawInput.replace(/，/g, ',').split(/[\s,]+/)
                .map(x => Math.round(parseFloat(x) * 100))
                .filter(x => !isNaN(x) && x > 0)
                .sort((a, b) => b - a);

    if (pool.length === 0) { alert("请录入发票金额"); return; }

    let finalResults = [];
    let startLimit = Math.round(startTargetValue * 100);
    let currentTarget = startLimit;

    while (true) {
        let poolSum = pool.reduce((a, b) => a + b, 0);
        if (poolSum < startLimit) break;

        while (true) {
            let combo = findSubsetSumPerfect(pool, currentTarget);
            if (combo) {
                finalResults.push({
                    items: combo.map(x => (x / 100).toFixed(2)),
                    total: (currentTarget / 100).toFixed(2)
                });
                for (let val of combo) {
                    const idx = pool.indexOf(val);
                    if (idx > -1) pool.splice(idx, 1);
                }
                pool.sort((a, b) => b - a);
            } else {
                break;
            }
        }
        currentTarget += 1;
        if (currentTarget > pool.reduce((a, b) => a + b, 0)) break;
        if (finalResults.length > 500) break;
    }

    const resultCardDiv = document.getElementById('resultCard');
    const resultContent = document.getElementById('resultContent');
    resultCardDiv.style.display = 'block';
    
    let html = "";
    finalResults.forEach((res, i) => {
        html += `
        <div class="res-card">
            <div class="res-top">
                <span class="res-label">方案集 #${i + 1}</span>
                <div style="text-align: right">
                    <span class="res-amount">¥${res.total}</span>
                </div>
            </div>
            <div class="tag-group">
                ${res.items.map(p => `<span class="item-tag">${p}</span>`).join('')}
            </div>
        </div>`;
    });
    
    let remain = pool.map(x => (x/100).toFixed(2));
    let remainSum = (pool.reduce((a,b)=>a+b, 0)/100).toFixed(2);
    html += `
    <div class="remain-card">
        <div class="remain-title">📉 剩余资产明细</div>
        <div class="tag-group" style="opacity: 0.8;">
            ${remain.length > 0 ? remain.map(p => `<span class="item-tag">${p}</span>`).join('') : '<span style="font-size:12px;color:#999">暂无剩余</span>'}
        </div>
        <div style="margin-top: 14px; font-size: 13px; color: #cf1322; font-weight: bold;">
            总价值合计：¥${remainSum}
        </div>
    </div>`;

    resultContent.innerHTML = html;
    setTimeout(() => { resultCardDiv.scrollIntoView({ behavior: 'smooth' }); }, 100);
}
</script>
</body>
</html>
