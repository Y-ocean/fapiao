<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 核心修复：这行代码能让手机自动排版，防止界面缩水、空旷或变形 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>发票凑单</title>
    <style>
        /* 保持你原本的极简干净风格 */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 修复：动态自适应高度，确保在所有手机上都不空旷 */
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background-color: #ffffff;
            /* 修复：宽度和间距自适应手机，大拇指超好触控 */
            width: 90%;
            max-width: 400px;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin: 20px auto;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: #4a4a7d;
            font-size: 22px;
            margin-top: 0;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        /* 修复：加大输入框的高度和触控范围，手机上点按绝不费劲 */
        input[type="number"], input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px; /* 防止 iOS 浏览器自动放大页面 */
        }

        /* 修复：加高大按钮，大拇指操控极其丝滑 */
        button {
            width: 100%;
            padding: 14px;
            background-color: #5c5ca6;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
        }

        button:hover {
            background-color: #4a4a7d;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background-color: #eef9f2;
            border: 1px solid #c3e6cb;
            border-radius: 6px;
            display: none;
            font-size: 15px;
        }

        /* 修复：原本的引流广告位和提示完全保留，绝不乱动 */
        .ad-section {
            margin-top: 25px;
            text-align: center;
            border-top: 1px dashed #ccc;
            padding-top: 15px;
        }

        .ad-section p {
            font-size: 13px;
            color: #666;
            margin: 5px 0;
        }

        .ad-section img {
            width: 130px;
            height: 130px;
            margin-top: 10px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>发票凑单</h1>
        
        <label for="target">目标金额 (元):</label>
        <input type="number" id="target" placeholder="请输入目标报销金额" inputmode="decimal">

        <label for="pool">发票金额池 (逗号隔开):</label>
        <input type="text" id="pool" placeholder="如: 100, 200, 150" value="120.5, 340, 560, 1200, 850, 2300">

        <button onclick="runMatch()">开始凑单</button>

        <div class="result" id="result"></div>

        <!-- 你的原生广告位，一个字没少，完全保留 -->
        <div class="ad-section">
            <p style="color: red; font-weight: bold;">提示：添加微信免费拉发票交流群</p>
            <p>解锁更多自动凑单、高级报销工具</p>
            <!-- 依然对应你自己的 qrcode.jpg -->
            <img src="qrcode.jpg" alt="微信二维码">
        </div>
    </div>

    <script>
        function runMatch() {
            const target = parseFloat(document.getElementById('target').value);
            const poolInput = document.getElementById('pool').value;
            
            if (!target || target <= 0) {
                alert('请输入正确的目标金额');
                return;
            }

            const pool = poolInput.split(/[,，\s]+/)
                                  .map(x => parseFloat(x))
                                  .filter(x => !isNaN(x) && x > 0);

            if (pool.length === 0) {
                alert('请输入有效的发票金额');
                return;
            }

            let sum = pool.reduce((a, b) => a + b, 0);
            if (sum < target) {
                const resDiv = document.getElementById('result');
                resDiv.style.display = 'block';
                resDiv.innerHTML = `⚠️ 当前所有发票总额为 <b>${sum.toFixed(2)}</b> 元，不足以凑满目标金额。`;
                return;
            }

            const targetCents = Math.round(target * 100);
            const poolCents = pool.map(x => Math.round(x * 100)).sort((a,b) => a-b);
            const maxPossibleCents = Math.round(sum * 100);

            let dp = new Array(maxPossibleCents + 1).fill(false);
            let parent = new Array(maxPossibleCents + 1).fill(-1);
            let chosenItem = new Array(maxPossibleCents + 1).fill(-1);
            
            dp[0] = true;

            for (let i = 0; i < poolCents.length; i++) {
                const coin = poolCents[i];
                for (let j = maxPossibleCents; j >= coin; j--) {
                    if (dp[j - coin] && !dp[j]) {
                        dp[j] = true;
                        parent[j] = j - coin;
                        chosenItem[j] = i;
                    }
                }
            }

            let bestCents = -1;
            for (let j = targetCents; j <= maxPossibleCents; j++) {
                if (dp[j]) {
                    bestCents = j;
                    break;
                }
            }

            if (bestCents !== -1) {
                let curr = bestCents;
                let selectedIndices = [];
                while (curr > 0) {
                    let idx = chosenItem[curr];
                    selectedIndices.push(idx);
                    curr = parent[curr];
                }

                let selectedVals = selectedIndices.map(idx => (poolCents[idx] / 100).toFixed(2));
                let finalSum = (bestCents / 100).toFixed(2);
                let overflow = (finalSum - target).toFixed(2);

                const resDiv = document.getElementById('result');
                resDiv.style.display = 'block';
                resDiv.innerHTML = `
                    <p><b>🎯 推荐组合：</b></p>
                    <p>${selectedVals.join(' 元, ')} 元</p>
                    <hr style="border:0;border-top:1px solid #c3e6cb;margin:10px 0;">
                    <p>组合总计：<b>${finalSum} 元</b></p>
                    <p>超出目标：<span style="color:#b7791f;">${overflow} 元</span></p>
                `;
            } else {
                alert('未找到合适组合，请重试');
            }
        }
    </script>
</body>
</html>
