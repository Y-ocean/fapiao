<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>发票凑单智能助手</title>
    <style>
        :root { --green: #07c160; --orange: #ff4e00; }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: #f2f2f2; margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { max-width: 400px; width: 100%; }

        /* 标题居中 */
        .header { text-align: center; margin: 10px 0; }
        .header h1 { font-size: 20px; margin: 0; color: #000; letter-spacing: 1px; }
        .header p { font-size: 11px; color: #666; margin: 4px 0; }

        .card { background: #fff; border-radius: 12px; padding: 12px; margin-bottom: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }

        /* 压缩输入区高度，确保首屏不翻页 */
        textarea {
            width: 100%; height: 90px; padding: 8px;
            border: 1px solid #ddd; border-radius: 8px;
            font-size: 13px; background: #fafafa; resize: none;
        }
        .setting-row { 
            display: flex; justify-content: center; align-items: center; 
            margin-top: 8px; gap: 8px; font-size: 13px; font-weight: bold;
        }
        .input-num {
            height: 30px; width: 80px; border: 1px solid #ddd; 
            border-radius: 4px; text-align: center; color: var(--green);
        }

        button {
            width: 100%; background: var(--green); color: #fff;
            border: none; padding: 12px; font-size: 16px; font-weight: bold;
            border-radius: 8px; margin-top: 10px; cursor: pointer;
        }

        /* 广告位：极致紧凑美观 */
        .ad-card { border: 2px solid var(--orange); background: #fffcf9; padding: 12px; }
        .ad-text { 
            font-size: 13px; color: var(--orange); font-weight: bold; 
            text-align: center; line-height: 1.4; margin-bottom: 10px;
        }
        .ad-flex { display: flex; justify-content: space-around; align-items: center; }
        .ad-qr-item { text-align: center; flex: 1; }
        .ad-qr-item img { 
            width: 110px; height: 110px; /* 加大二维码 */
            border: 1px solid #eee; border-radius: 4px; background: #fff;
        }
        .ad-qr-item span { display: block; font-size: 11px; font-weight: bold; margin-top: 5px; color: #333; }
        
        .footer-warn { font-size: 10px; color: #ee0a24; text-align: center; margin-top: 8px; font-weight: bold; }

        /* 结果区 */
        .res-item { border-left: 4px solid var(--green); background: #f9f9f9; padding: 8px; margin-bottom: 8px; border-radius: 4px; }
        .res-sum { color: var(--green); font-weight: bold; font-size: 15px; }
        .tag { font-size: 11px; background: #eee; padding: 2px 5px; margin: 2px; border-radius: 3px; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>发票凑单智能助手</h1>
        <p>💡拒绝烧脑 · 一键秒出最佳发票组合<br>数据不上传，自动计算最优的发票组合。</p>
    </div>

    <div class="card">
        <textarea id="invoiceInput" placeholder="输入金额明细(空格/逗号/换行)"></textarea>
        <div class="setting-row">
            <span>🎯 目标金额:</span>
            <input type="number" id="targetInput" class="input-num" value="100.00" step="0.01">
            <span>元起</span>
        </div>
        <button onclick="solveInvoiceLogic()">立即开启科学凑单</button>
    </div>

    <div class="card ad-card">
        <div class="ad-text">我们每天搜罗【淘/京/拼】领隐藏券、1分钱好物、外卖大红包，一年多省几千块！</div>
        <div class="ad-flex">
            <div class="ad-qr-item">
                <img src="mp.jpg" alt="公众号">
                <span style="color:#ff9800;">关注公众号</span>
            </div>
            <div class="ad-qr-item">
                <img src="wx.jpg" alt="微信">
                <span style="color:#00b0ff;">加小助手进群</span>
            </div>
        </div>
        <div class="footer-warn">⚠️ 漏洞单稍纵即逝，早进群1分钟，多抢一个免单！</div>
    </div>

    <div id="resultCard" style="display: none; margin-top: 5px;">
        <h3 style="font-size: 14px; margin: 5px;">📊 凑单计算结果：</h3>
        <div id="resultContent"></div>
    </div>
</div>

<script>
// --- 核心算法 100% 保持您的 Python 逻辑 ---
function findSubsetSumPerfect(nums, target) {
    let dp = { 0: -1 };
    for (let i = 0; i < nums.length; i++) {
        let val = nums[i];
        let newEntries = {};
        for (let s in dp) {
            let newSum = parseInt(s) + val;
            if (newSum <= target && !(newSum in dp)) {
                newEntries[newSum] = i;
            }
        }
        Object.assign(dp, newEntries);
        if (target in dp) {
            let res = [];
            let curr = target;
            while (curr > 0) {
                let index = dp[curr];
                let valFound = nums[index];
                res.push(valFound);
                curr -= valFound;
            }
            return res;
        }
    }
    return null;
}

function solveInvoiceLogic() {
    const rawInput = document.getElementById('invoiceInput').value;
    const startTargetValue = parseFloat(document.getElementById('targetInput').value);
    let pool = rawInput.replace(/，/g, ',').split(/[\s,]+/).map(x => Math.round(parseFloat(x) * 100)).filter(x => !isNaN(x) && x > 0).sort((a, b) => b - a);
    if (pool.length === 0) { alert("请输入金额数据"); return; }

    let finalResults = [];
    let startLimit = Math.round(startTargetValue * 100);
    let currentTarget = startLimit;

    while (true) {
        if (pool.reduce((a, b) => a + b, 0) < startLimit) break;
        while (true) {
            let combo = findSubsetSumPerfect(pool, currentTarget);
            if (combo) {
                finalResults.push({ items: combo.map(x => (x / 100).toFixed(2)), total: (currentTarget / 100).toFixed(2) });
                for (let val of combo) { const idx = pool.indexOf(val); if (idx > -1) pool.splice(idx, 1); }
                pool.sort((a, b) => b - a);
            } else { break; }
        }
        currentTarget += 1;
        if (currentTarget > pool.reduce((a, b) => a + b, 0)) break;
        if (finalResults.length > 500) break;
    }

    const resultCardDiv = document.getElementById('resultCard');
    const resultContent = document.getElementById('resultContent');
    resultCardDiv.style.display = 'block';
    
    let html = "";
    finalResults.forEach((res, i) => {
        html += `<div class="res-item">
            <div style="display:flex;justify-content:space-between">
                <span style="font-size:12px;color:#999">方案 ${i+1}</span>
                <span class="res-sum">¥${res.total}</span>
            </div>
            <div style="margin-top:5px">${res.items.map(p => `<span class="tag">${p}</span>`).join('')}</div>
        </div>`;
    });
    
    let remainSum = (pool.reduce((a,b)=>a+b, 0)/100).toFixed(2);
    html += `<div style="padding:10px;background:#fff1f0;border-radius:8px;font-size:12px;color:#cf1322;margin-top:10px;">
        <b>剩余未凑成总额：¥${remainSum}</b><br>
        <div style="margin-top:5px;opacity:0.7">${pool.map(x=>(x/100).toFixed(2)).join(', ')}</div>
    </div>`;

    resultContent.innerHTML = html;
}
</script>
</body>
</html>
